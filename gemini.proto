// To regenerate stubs: 
// python -m grpc_tools.protoc \
//  -I. \
//  --python_out=. \
//  --grpc_python_out=. \
//  gemini.proto
syntax = "proto3";

package gemini;

service GeminiService {
  rpc Generate (GenerateRequest) returns (GenerateResponse);
}

message GenerateRequest {
  string prompt = 1;
}

message GenerateResponse {
  string text = 1;
}