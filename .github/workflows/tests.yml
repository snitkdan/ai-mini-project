name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container: &ci-container
      image: ghcr.io/${{ github.repository }}/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: pytest -v

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container: *ci-container
    steps:
      - uses: actions/checkout@v4
      - run: mypy .

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container: *ci-container
    steps:
      - uses: actions/checkout@v4
      - run: ruff check . --output-format=grouped

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container: *ci-container
    steps:
      - uses: actions/checkout@v4
      - run: ruff format --check . --output-format=grouped

  dead-code:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container: *ci-container
    steps:
      - uses: actions/checkout@v4
      - run: vulture . --exclude experimental/,proto/generated/,.venv/ --min-confidence 80

  complexity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container: *ci-container
    steps:
      - uses: actions/checkout@v4
      - run: radon cc . -a -nc --exclude experimental,proto/generated,.venv/
      - run: radon mi . --exclude experimental,proto/generated,.venv/
      - run: xenon --max-absolute B --max-modules A --max-average A . --exclude experimental,proto/generated,.venv/

  proto-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container: *ci-container
    steps:
      - uses: actions/checkout@v4
      - run: python proto/regen_proto.py --check

  services-start:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container: *ci-container
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash start.sh --smoke-test